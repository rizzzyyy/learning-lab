<!DOCTYPE html>
<html>
<head>
    <title>My Simple Webpage</title>

    <style>
        body{
            font-family: Arial;
            background-color: #f2f2f2;
            text-align: center;
            margin-top: 100px;
        }

        h1{
            color: #333;
        }

        p{
            color: #666;
            font-size: 18px;
        }

        button{
            background-color: #4CAF50;
            color: white;
            padding: 10px 20px;
            border: none;
            font-size: 16px;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover{
            background-color: #45a049;
        }
    </style>

</head>

<body>

    <h1>Hello, World!</h1>
    <p>This is my first HTML and CSS program.</p>

    <button>Click Me</button>

</body>
</html>
